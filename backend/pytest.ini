[pytest]
testpaths = tests
filterwarnings =
    # A thread that dies with an exception must fail the test, not warn. Concurrency
    # tests are worthless if a worker can crash silently and the assertions still pass.
    error::pytest.PytestUnhandledThreadExceptionWarning
    # An exception raised where it cannot propagate (e.g. in a __del__ during a
    # worker's teardown) must also fail the test rather than scroll past as text.
    error::pytest.PytestUnraisableExceptionWarning
